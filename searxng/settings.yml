use_default_settings: true

server:
  # SearXNG overrides this with the SEARXNG_SECRET env var (settings_defaults.py,
  # environ_name='SEARXNG_SECRET'). The literal below is only a fallback: if
  # SEARXNG_SECRET is unset, it stays 'ultrasecretkey', which trips SearXNG's
  # production boot guard (webapp.py: sys.exit(1)) instead of shipping a weak secret.
  secret_key: 'ultrasecretkey'
  # Disable the anti-bot limiter so the support agent can query the JSON API.
  limiter: false

search:
  formats:
    - html
    - json
